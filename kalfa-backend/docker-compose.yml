version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: kalfa_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kalfa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kalfa_secret}
      POSTGRES_DB: ${POSTGRES_DB:-kalfa_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kalfa} -d ${POSTGRES_DB:-kalfa_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: kalfa_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kalfa}:${POSTGRES_PASSWORD:-kalfa_secret}@db:5432/${POSTGRES_DB:-kalfa_db}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
